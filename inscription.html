<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte | Bioptim</title>
  <meta name="description" content="Création de compte Bioptim.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container narrow">
    <header class="header">
      <a class="brand brand-link" href="index.html">
        <img src="logo-bioptim.svg" alt="" width="54" height="54">
        <div>
          <div class="brand-name">Bioptim</div>
          <div class="brand-subtitle">Comprendre ses analyses biologiques simplement</div>
        </div>
      </a>
    </header>

    <main class="panel auth-panel">
      <p class="intro">Créer un compte Bioptim</p>
      <h1 class="auth-title">Commencez en quelques informations</h1>
      <p class="auth-text">Créez votre compte pour accéder à vos demandes et envoyer vos analyses biologiques.</p>

      <form class="auth-form">
        <label>
          Nom et prénom
          <input type="text" placeholder="Votre nom complet">
        </label>
        <label>
          Adresse email
          <input type="email" placeholder="nom@email.fr">
        </label>
        <label>
          Mot de passe
          <input type="password" placeholder="Choisissez un mot de passe">
        </label>
        <label>
          Confirmer le mot de passe
          <input type="password" placeholder="Confirmez votre mot de passe">
        </label>
        <a class="button" href="depot.html">Créer mon compte</a>
      </form>

      <p class="form-note">Vous avez déjà un compte ? <a href="connexion.html">Se connecter</a></p>
    </main>
  </div>
</body>
</html>
