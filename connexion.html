<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion | Bioptim</title>
  <meta name="description" content="Connexion Bioptim.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container narrow">
    <header class="header">
      <a class="brand brand-link" href="index.html">
        <img src="logo-bioptim.svg" alt="" width="54" height="54">
        <div>
          <div class="brand-name">Bioptim</div>
          <div class="brand-subtitle">Comprendre ses analyses biologiques simplement</div>
        </div>
      </a>
    </header>

    <main class="panel auth-panel">
      <p class="intro">Connexion</p>
      <h1 class="auth-title">Retrouvez votre espace Bioptim</h1>
      <p class="auth-text">Connectez-vous pour consulter vos demandes ou transmettre un nouveau bilan.</p>

      <form class="auth-form">
        <label>
          Adresse email
          <input type="email" placeholder="nom@email.fr">
        </label>
        <label>
          Mot de passe
          <input type="password" placeholder="Votre mot de passe">
        </label>
        <a class="button" href="depot.html">Se connecter</a>
      </form>

      <p class="form-note">Pas encore de compte ? <a href="inscription.html">Créer un compte</a></p>
    </main>
  </div>
</body>
</html>
